name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: install clang/llvm/libbpf
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev libelf-dev zip \
            linux-headers-$(uname -r)

      - name: install bpftool
        run: |
          BPFTOOL_VERSION=v7.7.0
          BPFTOOL_SHA256=09150596f09356b0ff632dd7f9856e0ea86bf96b269e9bc94278d9a9432a268c
          curl -sfL -o /tmp/bpftool.tar.gz \
            "https://github.com/libbpf/bpftool/releases/download/${BPFTOOL_VERSION}/bpftool-${BPFTOOL_VERSION}-amd64.tar.gz"
          echo "${BPFTOOL_SHA256}  /tmp/bpftool.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/bpftool.tar.gz -C /usr/local/bin bpftool
          sudo chmod 0755 /usr/local/bin/bpftool
          bpftool version

      - name: generate vmlinux.h
        run: scripts/gen-vmlinux.sh

      - name: go generate
        run: go generate ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: go build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p bin
          go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_SHA::7}" \
            -o bin/minecraft-ebpf \
            ./cmd/minecraft-ebpf

      - name: package dev zip
        run: |
          mkdir -p stage
          cp bin/minecraft-ebpf stage/
          cp deploy/minecraft-ebpf.service stage/
          cp deploy/config.example stage/
          cp deploy/install.sh stage/
          cp deploy/grafana/minecraft-ebpf-dashboard.json stage/
          cp deploy/grafana/minecraft-ebpf-ips-dashboard.json stage/
          chmod 0755 stage/minecraft-ebpf stage/install.sh
          ZIP="minecraft-ebpf-dev-linux-${{ matrix.goarch }}.zip"
          (cd stage && zip -q "../$ZIP" \
            minecraft-ebpf \
            minecraft-ebpf.service \
            config.example \
            install.sh \
            minecraft-ebpf-dashboard.json \
            minecraft-ebpf-ips-dashboard.json)
          ls -l "$ZIP"

      - uses: actions/upload-artifact@v7
        with:
          name: minecraft-ebpf-dev-linux-${{ matrix.goarch }}
          path: minecraft-ebpf-dev-linux-${{ matrix.goarch }}.zip
          retention-days: 14
